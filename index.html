<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav-wrapper">
        <div class="navbar">
            <div class="nav-item active" onclick="showPage('overall')">🏆<br>Overall</div>
            <div class="nav-item" onclick="showPage('vanilla')">💠<br>Vanilla</div>
            <div class="nav-item" onclick="showPage('uhc')">❤️<br>UHC</div>
            <div class="nav-item" onclick="showPage('pot')">🧪<br>Pot</div>
            <div class="nav-item" onclick="showPage('nethop')">🌌<br>NethOP</div>
            <div class="nav-item" onclick="showPage('smp')">🟢<br>SMP</div>
            <div class="nav-item" onclick="showPage('sword')">⚔️<br>Sword</div>
            <div class="nav-item" onclick="showPage('axe')">🪓<br>Axe</div>
            <div class="nav-item" onclick="showPage('mace')">🔨<br>Mace</div>
        </div>
    </div>

    <div id="overall" class="page active">
        <div class="container">
            <div class="leaderboard">
                <div class="player-row" onclick="openProfile('Marlowww', '1', '450', 'NA', 'Combat Grandmaster')">
                    <div class="rank-badge gold">1.</div>
                    <div class="player-core">
                        <img src="https://mc-heads.net/avatar/Marlowww/48" class="player-head">
                        <div class="player-name-section">
                            <span class="ign">Marlowww</span>
                            <span class="rank-title">🔶 Combat Grandmaster <span class="pts">(450 points)</span></span>
                        </div>
                    </div>
                    <div class="region-tag na">NA</div>
                    <div class="tier-list-icons">
                        <div class="tier-bubble"><span class="icon">⚔️</span><span class="t-val ht1">HT1</span></div>
                        <div class="tier-bubble"><span class="icon">🧪</span><span class="t-val ht1">HT1</span></div>
                        <div class="tier-bubble"><span class="icon">🔨</span><span class="t-val lt1">LT1</span></div>
                        <div class="tier-bubble"><span class="icon">❤️</span><span class="t-val ht1">HT1</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="vanilla" class="page"><div class="tier-grid" id="vanilla-tiers"></div></div>
    <div id="uhc" class="page"><div class="tier-grid" id="uhc-tiers"></div></div>
    <div id="pot" class="page"><div class="tier-grid" id="pot-tiers"></div></div>
    <div id="nethop" class="page"><div class="tier-grid" id="nethop-tiers"></div></div>
    <div id="smp" class="page"><div class="tier-grid" id="smp-tiers"></div></div>
    <div id="sword" class="page"><div class="tier-grid" id="sword-tiers"></div></div>
    <div id="axe" class="page"><div class="tier-grid" id="axe-tiers"></div></div>
    <div id="mace" class="page"><div class="tier-grid" id="mace-tiers"></div></div>

    <div id="modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="profile-card">
            <span class="close-btn">&times;</span>
            <img id="mHead" src="" class="m-avatar">
            <h2 id="mName">Name</h2>
            <div id="mTitle" class="m-badge">Title</div>
            <div class="m-stats">
                <span class="label">POSITION</span>
                <div class="val"><span id="mRank">0</span>. 🏆 OVERALL (<span id="mPts">0</span> pts)</div>
            </div>
        </div>
    </div>

    <script>
        const pages = ['vanilla', 'uhc', 'pot', 'nethop', 'smp', 'sword', 'axe', 'mace'];
        pages.forEach(p => {
            const el = document.getElementById(`${p}-tiers`);
            for(let i=1; i<=5; i++) {
                el.innerHTML += `<div class="tier-col"><div class="tier-header t${i}">Tier ${i}</div><div class="tier-players" id="${p}-t${i}"></div></div>`;
            }
        });

        function showPage(id) {
            document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openProfile(n, r, p, reg, t) {
            document.getElementById('mName').innerText = n;
            document.getElementById('mRank').innerText = r;
            document.getElementById('mPts').innerText = p;
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mHead').src = `https://mc-heads.net/avatar/${n}/120`;
            document.getElementById('modal').style.display = "flex";
        }

        function closeModal(e) { if(e.target.id === 'modal' || e.target.className === 'close-btn') document.getElementById('modal').style.display = "none"; }
    </script>
</body>
</html>
