<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist | Overall Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="nav-item active">🏆 Overall</div>
        <div class="nav-item">⚔️ Vanilla</div>
        <div class="nav-item">🍎 UHC</div>
        <div class="nav-item">🧪 Pot</div>
        <div class="nav-item">🌌 NethOP</div>
        <div class="nav-item">🌳 SMP</div>
        <div class="nav-item">🗡️ Sword</div>
        <div class="nav-item">🪓 Axe</div>
        <div class="nav-item">🔨 Mace</div>
    </div>

    <div class="main-content">
        <h2 class="page-title">Overall Leaderboard</h2>
        
        <div class="leaderboard-table">
            <div class="table-header">
                <span>#</span>
                <span>PLAYER</span>
                <span>REGION</span>
                <span>TIERS</span>
            </div>

            <div class="player-entry">
                <span class="rank-num">1.</span>
                <div class="player-info">
                    <img src="https://mc-heads.net/avatar/Marlowww/40" alt="head">
                    <div class="name-box">
                        <span class="ign">Marlowww</span>
                        <span class="title gold">Combat Grandmaster</span>
                    </div>
                </div>
                <span class="region na">NA</span>
                <div class="tier-badges">
                    <span class="badge ht1">HT1</span>
                    <span class="badge lt1">LT1</span>
                </div>
            </div>

            <div class="player-entry">
                <span class="rank-num">2.</span>
                <div class="player-info">
                    <img src="https://mc-heads.net/avatar/ItzRealMe/40" alt="head">
                    <div class="name-box">
                        <span class="ign">ItzRealMe</span>
                        <span class="title silver">Combat Master</span>
                    </div>
                </div>
                <span class="region na">NA</span>
                <div class="tier-badges">
                    <span class="badge ht3">HT3</span>
                    <span class="badge ht1">HT1</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
