<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav-wrapper">
        <div class="navbar">
            <div class="nav-item active" onclick="showPage('overall')">🏆<br>Overall</div>
            <div class="nav-item" onclick="showPage('vanilla')">💠<br>Vanilla</div>
            <div class="nav-item" onclick="showPage('uhc')">❤️<br>UHC</div>
            <div class="nav-item" onclick="showPage('pot')">🧪<br>Pot</div>
            <div class="nav-item" onclick="showPage('nethop')">🌌<br>NethOP</div>
            <div class="nav-item" onclick="showPage('smp')">🟢<br>SMP</div>
            <div class="nav-item" onclick="showPage('sword')">⚔️<br>Sword</div>
            <div class="nav-item" onclick="showPage('axe')">🪓<br>Axe</div>
            <div class="nav-item" onclick="showPage('mace')">🔨<br>Mace</div>
        </div>
    </div>

    <div id="overall" class="page active">
        <div class="container">
            <div class="player-card" onclick="openProfile('Marlowww', '1', '450', 'NA', 'Combat Grandmaster')">
                <div class="rank-side">1.</div>
                <div class="card-main">
                    <img src="https://mc-heads.net/avatar/Marlowww/50" class="head">
                    <div class="info">
                        <span class="ign">Marlowww</span>
                        <span class="sub">🔶 Combat Grandmaster <small>(450 points)</small></span>
                    </div>
                </div>
                <div class="region-pill na">NA</div>
                <div class="tier-bubbles">
                    <div class="bubble"><span class="icon">⚔️</span><small class="ht1">HT1</small></div>
                    <div class="bubble"><span class="icon">🧪</span><small class="ht1">HT1</small></div>
                    <div class="bubble"><span class="icon">🔨</span><small class="lt1">LT1</small></div>
                    <div class="bubble"><span class="icon">❤️</span><small class="ht1">HT1</small></div>
                </div>
            </div>
        </div>
    </div>

    <div id="vanilla" class="page"><div class="tier-grid" id="vanilla-tiers"></div></div>
    <div id="uhc" class="page"><div class="tier-grid" id="uhc-tiers"></div></div>
    <div id="pot" class="page"><div class="tier-grid" id="pot-tiers"></div></div>
    <div id="nethop" class="page"><div class="tier-grid" id="nethop-tiers"></div></div>
    <div id="smp" class="page"><div class="tier-grid" id="smp-tiers"></div></div>
    <div id="sword" class="page"><div class="tier-grid" id="sword-tiers"></div></div>
    <div id="axe" class="page"><div class="tier-grid" id="axe-tiers"></div></div>
    <div id="mace" class="page"><div class="tier-grid" id="mace-tiers"></div></div>

    <div id="modal" class="modal-bg" onclick="closeM(event)">
        <div class="profile-card">
            <span class="close">&times;</span>
            <img id="mHead" src="" class="m-head">
            <h2 id="mName"></h2>
            <div id="mTitle" class="m-tag"></div>
            <div class="m-stat">
                <label>RANKING</label>
                <div class="val">#<span id="mRank"></span> 🏆 OVERALL (<span id="mPts"></span> pts)</div>
            </div>
        </div>
    </div>

    <script>
        const gamemodes = ['vanilla', 'uhc', 'pot', 'nethop', 'smp', 'sword', 'axe', 'mace'];
        gamemodes.forEach(mode => {
            const container = document.getElementById(`${mode}-tiers`);
            for(let i=1; i<=5; i++) {
                container.innerHTML += `<div class="tier-column"><div class="t-header t${i}">Tier ${i}</div><div class="p-list" id="${mode}-t${i}"></div></div>`;
            }
        });

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openProfile(n, r, p, reg, t) {
            document.getElementById('mName').innerText = n;
            document.getElementById('mRank').innerText = r;
            document.getElementById('mPts').innerText = p;
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mHead').src = `https://mc-heads.net/avatar/${n}/120`;
            document.getElementById('modal').style.display = "flex";
        }
        function closeM(e) { if(e.target.id==='modal' || e.target.className==='close') document.getElementById('modal').style.display="none"; }
    </script>
</body>
</html>
