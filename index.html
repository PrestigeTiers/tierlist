<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Tiers | Minecraft Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Background fix for GitHub Pages */
        .bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: url('./background.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(8px) brightness(0.35);
            transform: scale(1.1);
        }

        body { background-color: #0d0d0f; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; position: relative; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; backdrop-filter: blur(4px); }
        
        .pill-btn { padding: 10px 24px; border-radius: 12px; transition: 0.2s; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); color: #71717a; font-weight: 600; }
        .pill-btn.active { background: #1a1a1e; border-color: #facc15; color: #ffffff; }
        
        .sub-pill { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; background: transparent; transition: 0.2s; border: 1px solid transparent; color: #a1a1aa; font-weight: 700; font-size: 0.95rem; }
        .sub-pill.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: #ffffff; }
        .sub-pill svg { width: 18px; height: 18px; fill: currentColor; }
        .sub-pill img { width: 22px; height: 22px; object-fit: contain; }

        .tier-column { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; height: 75vh; display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        .tier-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: 900; text-transform: uppercase; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .player-square { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; transition: 0.2s; cursor: pointer; }
        .player-square:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        .tier-badge { background: #16161a; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: #a1a1aa; border: 1px solid #27272a; }
        .rating-num { color: #facc15; font-weight: 800; font-size: 1.6rem; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(15px); align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        
        .search-input { width: 200px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 12px; font-size: 0.9rem; outline: none; backdrop-filter: blur(5px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .points-card { background: #111116; border: 1px solid #1c1c24; border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
        .points-card h4 { color: #8e8e93; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; }
        .points-card .pts-val { color: #a855f7; font-size: 1.75rem; font-weight: 900; margin-bottom: 12px; }
        .points-card .bar { height: 4px; background: linear-gradient(90deg, #a855f7 0%, transparent 100%); border-radius: 2px; margin-bottom: 12px; }
        .points-card .label { color: #636366; font-size: 0.7rem; font-weight: 600; }
    </style>
</head>
<body class="p-8">

    <div class="bg-wrapper"></div>

    <header class="flex items-center justify-between mb-8 max-w-7xl mx-auto relative z-10">
        <h1 class="text-4xl font-black tracking-tighter italic text-yellow-400">BANANA TIERS</h1>
        <div class="flex gap-3">
            <button onclick="switchMain('global')" id="btn-global" class="pill-btn active">Global</button>
            <button onclick="switchMain('main')" id="btn-main" class="pill-btn">Main Modes</button>
            <button onclick="switchMain('sub')" id="btn-sub" class="pill-btn">Sub Modes</button>
        </div>
        <div class="flex items-center gap-3">
            <input type="text" id="searchBar" class="search-input" placeholder="Search players..." onkeyup="handleSearch(event)">
            <button onclick="openInfo()" class="pill-btn bg-white/10 text-white border-white/20">Information</button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto relative z-10">
        <div id="sub-nav-container" class="glass-card p-2 flex gap-2 mb-8 overflow-x-auto no-scrollbar"></div>
    </div>

    <main class="max-w-7xl mx-auto h-[75vh] overflow-y-auto pr-2 no-scrollbar relative z-10" id="content-display"></main>

    <div id="infoModal" class="modal-overlay" onclick="closeInfo()">
        <div class="bg-[#0d0d11] p-10 rounded-3xl border border-white/10 w-[900px] max-w-[95vw]" onclick="event.stopPropagation()">
            <div class="mb-8">
                <h2 class="text-3xl font-black mb-2">How the Point System Works</h2>
                <p class="text-zinc-400 text-sm">BananaTiers tracks player rankings across different game modes. Each tier assignment earns points based on the difficulty and prestige of achieving that rank.</p>
            </div>
            <div class="grid grid-cols-5 gap-4" id="info-grid-container"></div>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay" onclick="closeProfile()">
        <div class="profile-card bg-[#0d0d11] p-8 rounded-3xl border border-white/10 w-[450px]" onclick="event.stopPropagation()">
            <img id="p-avatar" src="" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-yellow-500 shadow-2xl">
            <h2 id="p-name" class="text-center text-3xl font-black mb-6"></h2>
            <div class="glass-card p-4 flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div id="p-trophy-icon" class="w-6 h-6 text-yellow-500"></div>
                    <span class="font-bold">Total Points</span>
                </div>
                <span id="p-total" class="rating-num"></span>
            </div>
            <div id="p-tiers-grid" class="grid grid-cols-5 gap-3"></div>
        </div>
    </div>

    <script>
        // SVG Icons
        const ICONS = {
            trophy: `<svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 13.9V17H8v2h8v-2h-3v-3.1a5.01 5.01 0 0 0 2.61-3.96C18.08 9.63 20 7.55 20 5V4c0-1.1-.9-2-2-2zm-10 5.09A3.001 3.001 0 0 1 6 4h2v3.09zM18 4v1c0 .98-.71 1.79-1.64 1.97A2.996 2.996 0 0 1 16 4h2z"/></svg>`,
            globe: `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`
        };

        const ASSETS = {
            'Sword': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/diamond_sword.png',
            'Axe': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/diamond_axe.png',
            'Vanilla': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/end_crystal.png',
            'Pot': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/potion.png',
            'NethOP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/netherite_helmet.png',
            'UHC': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/lava_bucket.png',
            'SMP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/ender_pearl.png',
            'Mace': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/mace.png',
            'Minecart': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/tnt_minecart.png',
            'DSMP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/chorus_fruit.png',
            'Spear Mace': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/breeze_rod.png'
        };

        const TIERS_CONFIG = { 'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10, 'LT3': 6, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };
        const REGIONS = ['EU', 'NA', 'ME', 'AS', 'SA', 'AU', 'AF'];

        const PLAYERS = [
            { name: "ossspooky", region: "EU", skin: "https://mc-heads.net/avatar/ossspooky/64", ranks: { 'Sword': 'HT1', 'Axe': 'LT1', 'Vanilla': 'HT2' }},
            { name: "KamQd", region: "NA", skin: "https://mc-heads.net/avatar/KamQd/64", ranks: { 'Sword': 'LT1', 'Mace': 'LT2' }},
            { name: "Asher", region: "AS", skin: "https://mc-heads.net/avatar/MHF_Steve/64", ranks: { 'Sword': 'HT2', 'Pot': 'LT2' }}
        ];

        let activeMain = 'global', activeSub = 'Overall';

        function calculateRating(p) { return Object.values(p.ranks).reduce((acc, t) => acc + (TIERS_CONFIG[t] || 0), 0); }

        function switchMain(key) {
            activeMain = key; 
            activeSub = (key === 'global' ? 'Overall' : (key === 'main' ? 'Sword' : 'Minecart'));
            document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
            renderSubNav(); renderContent();
        }

        function renderSubNav() {
            const modes = {
                global: ['Overall', ...REGIONS],
                main: ['Sword', 'Axe', 'Vanilla', 'Pot', 'NethOP', 'UHC', 'SMP', 'Mace'],
                sub: ['Minecart', 'DSMP', 'Spear Mace']
            };
            
            document.getElementById('sub-nav-container').innerHTML = modes[activeMain].map(m => {
                let iconHtml = '';
                if (m === 'Overall') {
                    iconHtml = ICONS.trophy;
                } else if (REGIONS.includes(m)) {
                    iconHtml = ICONS.globe;
                } else {
                    iconHtml = `<img src="${ASSETS[m]}">`;
                }

                return `
                    <button onclick="switchSub('${m}')" class="sub-pill ${activeSub === m ? 'active' : ''}">
                        ${iconHtml}
                        ${m}
                    </button>
                `;
            }).join('');
        }

        function switchSub(m) { activeSub = m; renderSubNav(); renderContent(); }

        function renderContent() {
            const container = document.getElementById('content-display');
            let list = [...PLAYERS].sort((a,b) => calculateRating(b) - calculateRating(a));
            if (REGIONS.includes(activeSub)) list = list.filter(p => p.region === activeSub);

            if (activeSub === 'Overall' || REGIONS.includes(activeSub)) {
                container.innerHTML = list.map((p, i) => `
                    <div class="glass-card p-5 mb-4 flex items-center hover:bg-white/[0.08] transition" onclick="openProfile('${p.name}')">
                        <div class="w-20 font-black text-2xl ${i < 3 ? 'text-yellow-500' : 'text-zinc-600'}">${i+1}</div>
                        <div class="flex-1 flex items-center gap-5">
                            <img src="${p.skin}" class="w-12 h-12 rounded-lg border border-white/10">
                            <span class="font-bold text-lg">${p.name}</span>
                        </div>
                        <div class="w-32"><span class="bg-white/5 px-3 py-1 rounded-md text-xs font-bold border border-white/10">${p.region}</span></div>
                        <div class="w-72 flex gap-2">
                            ${Object.entries(p.ranks).slice(0, 4).map(([m, t]) => `<div class="flex flex-col items-center"><img src="${ASSETS[m]}" class="w-5 h-5 mb-1"><div class="tier-badge">${t}</div></div>`).join('')}
                        </div>
                        <div class="w-32 text-right rating-num">${calculateRating(p)}</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<div class="grid grid-cols-5 gap-6">${[1,2,3,4,5].map(t => `
                    <div class="tier-column">
                        <div class="tier-header ${t === 1 ? 'text-yellow-500' : 'text-zinc-500'}">Tier ${t}</div>
                        <div class="p-4 flex flex-col gap-3">
                            ${PLAYERS.filter(p => p.ranks[activeSub] === `HT${t}` || p.ranks[activeSub] === `LT${t}`).map(p => `
                                <div class="player-square" onclick="openProfile('${p.name}')">
                                    <img src="${p.skin}" class="w-8 h-8 rounded border border-white/10">
                                    <div class="flex flex-col">
                                        <span class="font-bold text-sm">${p.name}</span>
                                        <span class="text-[9px] text-zinc-500 font-black uppercase">${p.ranks[activeSub]}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('')}</div>`;
            }
        }

        function openProfile(name) {
            const p = PLAYERS.find(x => x.name === name);
            if(!p) return;
            document.getElementById('p-avatar').src = p.skin;
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-total').innerText = calculateRating(p);
            document.getElementById('p-trophy-icon').innerHTML = ICONS.trophy;
            document.getElementById('p-tiers-grid').innerHTML = Object.entries(p.ranks).map(([m, t]) => `
                <div class="flex flex-col items-center p-2 glass-card rounded-xl">
                    <img src="${ASSETS[m]}" class="w-6 h-6 mb-1">
                    <span class="text-[10px] font-bold text-zinc-400">${t}</span>
                </div>`).join('');
            document.getElementById('profileModal').classList.add('active');
        }
        function closeProfile() { document.getElementById('profileModal').classList.remove('active'); }

        function openInfo() {
            const grid = document.getElementById('info-grid-container');
            grid.innerHTML = Object.entries(TIERS_CONFIG).map(([tier, pts]) => `
                <div class="points-card">
                    <h4>${tier}</h4>
                    <div class="pts-val">${pts} pts</div>
                    <div class="bar" style="width: ${Math.max(10, (pts/60)*100)}%"></div>
                    <div class="label">Leaderboard rank</div>
                </div>
            `).join('');
            document.getElementById('infoModal').classList.add('active');
        }
        function closeInfo() { document.getElementById('infoModal').classList.remove('active'); }

        function handleSearch(e) { if(e.key === 'Enter') { const f = PLAYERS.find(p => p.name.toLowerCase().includes(e.target.value.toLowerCase())); if(f) openProfile(f.name); } }

        switchMain('global');
    </script>
</body>
</html>
