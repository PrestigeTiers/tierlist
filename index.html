<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Tiers | Minecraft Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDsi2sk-hGyhkI1rqVpmSbozKVPDaoVyf8",
            authDomain: "banana-tiers.firebaseapp.com",
            databaseURL: "https://banana-tiers-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "banana-tiers",
            storageBucket: "banana-tiers.firebasestorage.app",
            messagingSenderId: "180092644757",
            appId: "1:180092644757:web:2092687c03e602cf16da9c",
            measurementId: "G-HYECP0CP35"
        };

        // INITIALIZE FIREBASE
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const TIERS_CONFIG = { 'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10, 'LT3': 6, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };
        
        const MAIN_MODES_LIST = ['sword', 'axe', 'vanilla', 'pot', 'nethop', 'uhc', 'smp', 'mace'];
        const SUB_MODES_LIST = ['minecart', 'dsmp', 'spearmace', 'speed', 'ogvanilla'];

        // LIVE LISTENER
        const userRef = ref(db, 'tier_list');
        onValue(userRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const playerArray = [];

                Object.keys(data).forEach(key => {
                    const item = data[key];
                    if (!item) return;
                    
                    const username = item.ign || item.username;
                    if (!username || /^\d+$/.test(username) || username.toLowerCase() === 'unknown') return; 

                    const rawTiers = item.tiers || {};
                    const cleanTiers = {};
                    let totalPoints = 0;
                    let mainPoints = 0;
                    let subPoints = 0;

                    Object.keys(rawTiers).forEach(modeKey => {
                        const tierValue = rawTiers[modeKey];
                        if (tierValue) {
                            const upperTier = tierValue.toString().toUpperCase().trim();
                            if (TIERS_CONFIG[upperTier]) {
                                const formattedKey = modeKey.toLowerCase().replace(/\s+/g, '').trim();
                                cleanTiers[formattedKey] = upperTier;
                                
                                const pts = TIERS_CONFIG[upperTier];
                                totalPoints += pts;
                                
                                if (MAIN_MODES_LIST.includes(formattedKey)) {
                                    mainPoints += pts;
                                } else if (SUB_MODES_LIST.includes(formattedKey)) {
                                    subPoints += pts;
                                }
                            }
                        }
                    });

                    if (totalPoints === 0) return; 

                    let finalRegion = (item.region || "NA").toUpperCase().trim();
                    if (finalRegion === "UNKNOWN" || finalRegion === "") {
                        finalRegion = "NA";
                    }

                    playerArray.push({
                        name: username,
                        region: finalRegion,
                        skin: `https://mc-heads.net/avatar/${username}/64`,
                        ranks: cleanTiers, 
                        points: totalPoints,
                        mainPoints: mainPoints,
                        subPoints: subPoints
                    });
                });

                window.PLAYERS = playerArray;
                renderContent(); 
            } else {
                document.getElementById('content-display').innerHTML = '<div class="text-center p-20 text-zinc-500 font-bold">No verified tier data found.</div>';
            }
        });
    </script>

    <style>
        /* Your Uploaded Minecraft Landscape Background Image */
        .bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: url('background.png') no-repeat center center;
            background-size: cover;
            transform: scale(1.05);
            filter: blur(8px) brightness(0.45);
        }

        /* Translucent black overlay over the whole site */
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: rgba(10, 11, 14, 0.84);
            backdrop-filter: blur(4px);
        }

        body { color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; position: relative; }
        
        /* Premium Frosted Glass Cards */
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 14px; backdrop-filter: blur(8px); }
        
        /* Pills & Buttons with Neon Blue Highlight System */
        .pill-btn { padding: 10px 24px; border-radius: 12px; transition: all 0.25s ease; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); color: #a1a1aa; font-weight: 600; }
        .pill-btn:hover { border-color: rgba(0, 242, 255, 0.4); color: #ffffff; }
        .pill-btn.active { background: rgba(0, 242, 255, 0.06); border-color: #00f2ff; color: #00f2ff; box-shadow: 0 0 12px rgba(0, 242, 255, 0.15); }
        
        .sub-pill { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; background: transparent; transition: all 0.2s; border: 1px solid transparent; color: #a1a1aa; font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
        .sub-pill:hover { color: #ffffff; }
        .sub-pill.active { background: rgba(255,255,255,0.04); border-color: rgba(0, 242, 255, 0.3); color: #00f2ff; }
        
        /* Column views */
        .tier-column { background: rgba(5, 6, 8, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; height: 75vh; display: flex; flex-direction: column; }
        .tier-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); text-align: center; font-weight: 900; text-transform: uppercase; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .player-square { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; cursor: pointer; }
        .player-square:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(0, 242, 255, 0.3); transform: translateY(-2px); }
        
        .tier-badge { background: rgba(0, 0, 0, 0.4); padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: #a1a1aa; border: 1px solid rgba(255,255,255,0.08); }
        .rating-num { color: #00f2ff; font-weight: 800; font-size: 1.6rem; text-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        
        /* Podium Card Background Sliders with Fade Out effect (Right to Left) */
        .podium-1st { background: linear-gradient(to left, rgba(212, 175, 55, 0.12) 0%, rgba(212, 175, 55, 0.04) 40%, rgba(255, 255, 255, 0.02) 100%) !important; border-right: 2px solid rgba(212, 175, 55, 0.4) !important; }
        .podium-2nd { background: linear-gradient(to left, rgba(192, 192, 192, 0.12) 0%, rgba(192, 192, 192, 0.04) 40%, rgba(255, 255, 255, 0.02) 100%) !important; border-right: 2px solid rgba(192, 192, 192, 0.4) !important; }
        .podium-3rd { background: linear-gradient(to left, rgba(205, 127, 50, 0.12) 0%, rgba(205, 127, 50, 0.04) 40%, rgba(255, 255, 255, 0.02) 100%) !important; border-right: 2px solid rgba(205, 127, 50, 0.4) !important; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(4, 5, 7, 0.85); z-index: 100; backdrop-filter: blur(20px); align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        
        /* Input Search Box */
        .search-input { width: 200px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 12px; font-size: 0.9rem; outline: none; transition: all 0.2s; }
        .search-input:focus { border-color: #00f2ff; box-shadow: 0 0 8px rgba(0, 242, 255, 0.2); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .points-card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; text-align: left; }
        .points-card h4 { color: #ffffff; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; }
        .points-card .pts-val { color: #00f2ff; font-size: 1.75rem; font-weight: 900; margin-bottom: 12px; }
        .points-card .bar { height: 6px; background: #00f2ff; border-radius: 3px; margin-bottom: 12px; box-shadow: 0 0 8px rgba(0, 242, 255, 0.4); }
    </style>
</head>
<body class="p-8">

    <div class="bg-wrapper"></div>
    <div class="bg-overlay"></div>

    <header class="flex items-center justify-between mb-8 max-w-7xl mx-auto relative z-10">
        <h1 class="text-4xl font-black tracking-tighter italic text-cyan-400 drop-shadow-[0_0_15px_rgba(0,242,255,0.3)]">PRESTIGE TIERS</h1>
        <div class="flex gap-3">
            <button onclick="switchMain('global')" id="btn-global" class="pill-btn active">Global</button>
            <button onclick="switchMain('main')" id="btn-main" class="pill-btn">Main Modes</button>
            <button onclick="switchMain('sub')" id="btn-sub" class="pill-btn">Sub Modes</button>
        </div>
        <div class="flex items-center gap-3">
            <input type="text" id="searchBar" class="search-input" placeholder="Search players..." onkeyup="handleSearch(event)">
            <button onclick="openInfo()" class="pill-btn bg-white/5 text-white border-white/10 hover:border-cyan-400">Information</button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto relative z-10">
        <div id="sub-nav-container" class="glass-card p-2 flex gap-2 mb-8 overflow-x-auto no-scrollbar"></div>
    </div>

    <main class="max-w-7xl mx-auto h-[75vh] overflow-y-auto pr-2 no-scrollbar relative z-10" id="content-display">
        <div class="text-center p-20 text-zinc-500 font-bold">Connecting to Database...</div>
    </main>

    <div id="infoModal" class="modal-overlay" onclick="closeInfo()">
        <div class="bg-[#090a0d] p-10 rounded-3xl border border-white/10 w-[950px] max-w-[95vw]" onclick="event.stopPropagation()">
            <div class="flex gap-4 border-b border-white/10 mb-6 pb-2">
                <button onclick="switchInfoTab('points')" id="tab-points" class="text-xl font-black pb-2 border-b-2 border-cyan-400 text-cyan-400">Point System</button>
                <button onclick="switchInfoTab('titles')" id="tab-titles" class="text-xl font-black pb-2 border-b-2 border-transparent text-zinc-500 hover:text-white">Titles</button>
            </div>
            <div id="info-tab-points" class="grid grid-cols-5 gap-4"></div>
            <div id="info-tab-titles" class="grid grid-cols-2 gap-4 hidden"></div>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay" onclick="closeProfile()">
        <div class="profile-card bg-[#090a0d] p-8 rounded-3xl border border-white/10 w-[450px]" onclick="event.stopPropagation()">
            <img id="p-avatar" src="" class="w-24 h-24 rounded-full mx-auto mb-2 border-4 border-cyan-400 shadow-[0_0_20px_rgba(0,242,255,0.2)]">
            <h2 id="p-name" class="text-center text-3xl font-black tracking-tight"></h2>
            
            <div class="text-center mt-1 mb-2 flex items-center justify-center gap-2">
                <span id="p-region" class="bg-cyan-500/10 px-3 py-0.5 rounded-md text-[11px] font-bold border border-cyan-500/30 text-cyan-400 uppercase tracking-widest"></span>
                <span id="p-rank-pos" class="bg-zinc-500/10 px-3 py-0.5 rounded-md text-[11px] font-bold border border-white/10 text-white uppercase tracking-widest"></span>
            </div>

            <div id="p-title" class="text-center text-xs font-bold uppercase tracking-widest text-zinc-400 mb-6"></div>
            <div class="glass-card p-4 flex justify-between items-center mb-6">
                <span class="font-bold text-zinc-300">Total Points</span>
                <span id="p-total" class="rating-num"></span>
            </div>
            <div id="p-tiers-grid" class="grid grid-cols-5 gap-3"></div>
        </div>
    </div>

    <script>
        window.PLAYERS = []; 
        const ICONS = {
            trophy: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-cyan-400"><path d="M18 2H6c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 13.9V17H8v2h8v-2h-3v-3.1a5.01 5.01 0 0 0 2.61-3.96C18.08 9.63 20 7.55 20 5V4c0-1.1-.9-2-2-2zm-10 5.09A3.001 3.001 0 0 1 6 4h2v3.09zM18 4v1c0 .98-.71 1.79-1.64 1.97A2.996 2.996 0 0 1 16 4h2z"/></svg>`,
            globe: `<svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-cyan-400"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`
        };

        const ASSETS = {
            'Sword': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/diamond_sword.png',
            'Axe': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/diamond_axe.png',
            'Vanilla': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/end_crystal.png',
            'Pot': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/potion.png',
            'NethOP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/netherite_helmet.png',
            'UHC': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/lava_bucket.png',
            'SMP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/ender_pearl.png',
            'Mace': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/mace.png',
            'Minecart': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/tnt_minecart.png',
            'DSMP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/chorus_fruit.png',
            'Spear Mace': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/breeze_rod.png',
            'Speed': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/splash_potion.png',
            'Og Vanilla': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/golden_apple.png'
        };

        const TIERS_CONFIG = { 'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10, 'LT3': 6, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };
        const REGIONS = ['EU', 'NA', 'AS'];

        let activeMain = 'global', activeSub = 'Overall';

        function getPlayerTitle(pts) {
            if (pts >= 400) return "Combat Grandmaster";
            if (pts >= 250) return "Combat Master";
            if (pts >= 100) return "Combat Ace";
            if (pts >= 50) return "Combat Specialist";
            if (pts >= 20) return "Combat Cadet";
            if (pts >= 10) return "Combat Novice";
            return "Rookie";
        }

        function switchMain(key) {
            activeMain = key; activeSub = 'Overall';
            document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
            renderSubNav(); renderContent();
        }

        function renderSubNav() {
            const modes = {
                global: ['Overall', ...REGIONS],
                main: ['Overall', 'Sword', 'Axe', 'Vanilla', 'Pot', 'NethOP', 'UHC', 'SMP', 'Mace'],
                sub: ['Overall', 'Minecart', 'DSMP', 'Spear Mace', 'Speed', 'Og Vanilla']
            };
            document.getElementById('sub-nav-container').innerHTML = modes[activeMain].map(m => {
                let iconHtml = (m === 'Overall') ? ICONS.trophy : (REGIONS.includes(m) ? ICONS.globe : `<img src="${ASSETS[m]}" style="width:20px">`);
                return `<button onclick="switchSub('${m}')" class="sub-pill ${activeSub === m ? 'active' : ''}">${iconHtml}${m}</button>`;
            }).join('');
        }

        function switchSub(m) { activeSub = m; renderSubNav(); renderContent(); }

        function renderContent() {
            const container = document.getElementById('content-display');
            if(!window.PLAYERS || window.PLAYERS.length === 0) {
                container.innerHTML = '<div class="text-center p-20 text-zinc-500 font-bold">No verified players with tiers to display.</div>';
                return;
            }

            let list = [...window.PLAYERS];
            
            // Handle active context for Overall metrics
            if (activeSub === 'Overall') {
                if (activeMain === 'main') {
                    list = list.filter(p => p.mainPoints > 0).sort((a,b) => b.mainPoints - a.mainPoints);
                } else if (activeMain === 'sub') {
                    list = list.filter(p => p.subPoints > 0).sort((a,b) => b.subPoints - a.subPoints);
                } else {
                    list.sort((a,b) => b.points - a.points);
                }
            } else if (REGIONS.includes(activeSub)) {
                list = list.filter(p => p.region === activeSub).sort((a,b) => b.points - a.points);
            }

            if (activeSub === 'Overall' || REGIONS.includes(activeSub)) {
                // Table Label Headings Rows Inserted Here
                let tableHtml = `
                    <div class="flex items-center px-5 mb-2 text-xs font-bold tracking-widest uppercase text-zinc-500/80">
                        <div class="w-20">#</div>
                        <div class="flex-1">Player</div>
                        <div class="w-24">Region</div>
                        <div class="w-80">Tiers</div>
                        <div class="w-32 text-right">Points</div>
                    </div>
                `;

                tableHtml += list.map((p, i) => {
                    let displayPoints = p.points;
                    if (activeSub === 'Overall') {
                        if (activeMain === 'main') displayPoints = p.mainPoints;
                        if (activeMain === 'sub') displayPoints = p.subPoints;
                    }

                    // Assign podium color styling hooks dynamically
                    let podiumClass = '';
                    if (i === 0) podiumClass = 'podium-1st';
                    if (i === 1) podiumClass = 'podium-2nd';
                    if (i === 2) podiumClass = 'podium-3rd';

                    return `
                    <div class="glass-card p-5 mb-4 flex items-center hover:bg-white/[0.04] hover:border-cyan-500/30 transition cursor-pointer ${podiumClass}" onclick="openProfile('${p.name}')">
                        <div class="w-20 font-black text-2xl ${i < 3 ? 'text-cyan-400 drop-shadow-[0_0_8px_rgba(0,242,255,0.4)]' : 'text-zinc-600'}">${i+1}</div>
                        <div class="flex-1 flex items-center gap-5">
                            <img src="${p.skin}" class="w-12 h-12 rounded-lg border border-white/10">
                            <div class="flex flex-col">
                                <span class="font-bold text-lg leading-tight text-white">${p.name}</span>
                                <span class="text-[11px] font-semibold text-zinc-400/80 mt-0.5 tracking-wide">${getPlayerTitle(p.points)}</span>
                            </div>
                        </div>
                        <div class="w-24">
                            <span class="bg-cyan-500/5 px-3 py-1.5 rounded-lg text-xs font-black border border-cyan-500/10 text-cyan-400 tracking-wider">${p.region}</span>
                        </div>
                        <div class="w-80 flex flex-wrap gap-2 items-center">
                            ${Object.keys(ASSETS).map(m => {
                                const dbKeyClean = m.toLowerCase().replace(/\s+/g, '');
                                const t = p.ranks[dbKeyClean];
                                if(!t) return '';
                                return `<div class="flex items-center bg-white/[0.02] border border-white/[0.05] rounded-md px-1.5 py-0.5 gap-1"><img src="${ASSETS[m]}" class="w-4 h-4"><div class="text-[9px] font-bold text-zinc-300">${t}</div></div>`;
                            }).join('')}
                        </div>
                        <div class="w-32 text-right rating-num">${displayPoints}</div>
                    </div>
                `}).join('');
                
                container.innerHTML = tableHtml;
            } else {
                const currentModeLowerClean = activeSub.toLowerCase().replace(/\s+/g, '');
                container.innerHTML = `<div class="grid grid-cols-5 gap-6">${[1,2,3,4,5].map(t => {
                    const htPlayers = window.PLAYERS.filter(p => p.ranks[currentModeLowerClean] === `HT${t}`);
                    const ltPlayers = window.PLAYERS.filter(p => p.ranks[currentModeLowerClean] === `LT${t}`);
                    const filteredPlayers = [...htPlayers, ...ltPlayers];

                    return `
                    <div class="tier-column">
                        <div class="tier-header ${t === 1 ? 'text-cyan-400 drop-shadow-[0_0_6px_rgba(0,242,255,0.3)]' : 'text-zinc-500'}">Tier ${t}</div>
                        <div class="p-4 flex flex-col gap-3 overflow-y-auto no-scrollbar">
                            ${filteredPlayers.length === 0 ? '<div class="text-xs text-center text-zinc-600 p-4 font-semibold">Empty</div>' : filteredPlayers.map(p => `
                                <div class="player-square" onclick="openProfile('${p.name}')">
                                    <img src="${p.skin}" class="w-8 h-8 rounded border border-white/10">
                                    <div class="flex flex-col">
                                        <span class="font-bold text-sm text-white">${p.name}</span>
                                        <span class="text-[9px] ${p.ranks[currentModeLowerClean].startsWith('HT') ? 'text-cyan-400' : 'text-zinc-500'} font-black uppercase tracking-wider">${p.ranks[currentModeLowerClean]}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `}).join('')}</div>`;
            }
        }

        window.switchMain = switchMain;
        window.switchSub = switchSub;

        window.openProfile = function(name) {
            // Sort to calculate current precise rank position indexing values
            let orderedList = [...window.PLAYERS].sort((a,b) => b.points - a.points);
            const rankIndex = orderedList.findIndex(x => x.name === name);
            const p = orderedList[rankIndex];
            if(!p) return;

            document.getElementById('p-avatar').src = p.skin;
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-region').innerText = `Region: ${p.region}`;
            
            // Insert Overall Rank calculations values inside Modal display
            document.getElementById('p-rank-pos').innerText = `Rank: #${rankIndex + 1}`;

            document.getElementById('p-title').innerText = getPlayerTitle(p.points);
            document.getElementById('p-total').innerText = p.points;
            document.getElementById('p-tiers-grid').innerHTML = Object.keys(ASSETS).map(m => {
                const dbKeyClean = m.toLowerCase().replace(/\s+/g, '');
                const t = p.ranks[dbKeyClean];
                if(!t) return '';
                return `
                <div class="flex flex-col items-center p-2 glass-card rounded-xl">
                    <img src="${ASSETS[m]}" class="w-6 h-6 mb-1">
                    <span class="text-[10px] font-bold text-zinc-400">${t}</span>
                </div>`;
            }).join('');
            document.getElementById('profileModal').classList.add('active');
        }
        window.closeProfile = function() { document.getElementById('profileModal').classList.remove('active'); }

        window.openInfo = function() {
            document.getElementById('info-tab-points').innerHTML = Object.entries(TIERS_CONFIG).map(([tier, pts]) => `
                <div class="points-card">
                    <h4>${tier}</h4>
                    <div class="pts-val">${pts} pts</div>
                    <div class="bar" style="width: ${Math.max(5, (pts/60)*100)}%"></div>
                </div>
            `).join('');

            const titlesData = [
                { name: "Combat Grandmaster", desc: "Obtained 400+ total points." },
                { name: "Combat Master", desc: "Obtained 250+ total points." },
                { name: "Combat Ace", desc: "Obtained 100+ total points." },
                { name: "Combat Specialist", desc: "Obtained 50+ total points." },
                { name: "Combat Cadet", desc: "Obtained 20+ total points." },
                { name: "Combat Novice", desc: "Obtained 10+ total points." },
                { name: "Rookie", desc: "Less than 10 points." }
            ];
            document.getElementById('info-tab-titles').innerHTML = titlesData.map(t => `
                <div class="points-card">
                    <h4 class="text-cyan-400 !text-sm drop-shadow-[0_0_6px_rgba(0,242,255,0.2)]">${t.name}</h4>
                    <div class="text-xs font-medium text-zinc-400 mt-1">${t.desc}</div>
                </div>
            `).join('');

            switchInfoTab('points');
            document.getElementById('infoModal').classList.add('active');
        }
        window.closeInfo = function() { document.getElementById('infoModal').classList.remove('active'); }

        window.switchInfoTab = function(tab) {
            if(tab === 'points') {
                document.getElementById('info-tab-points').classList.remove('hidden');
                document.getElementById('info-tab-titles').classList.add('hidden');
                document.getElementById('tab-points').className = "text-xl font-black pb-2 border-b-2 border-cyan-400 text-cyan-400";
                document.getElementById('tab-titles').className = "text-xl font-black pb-2 border-b-2 border-transparent text-zinc-500 hover:text-white";
            } else {
                document.getElementById('info-tab-points').classList.add('hidden');
                document.getElementById('info-tab-titles').classList.remove('hidden');
                document.getElementById('tab-points').className = "text-xl font-black pb-2 border-b-2 border-transparent text-zinc-500 hover:text-white";
                document.getElementById('tab-titles').className = "text-xl font-black pb-2 border-b-2 border-cyan-400 text-cyan-400";
            }
        }

        window.handleSearch = function(e) { if(e.key === 'Enter') { const f = window.PLAYERS.find(p => p.name.toLowerCase().includes(e.target.value.toLowerCase())); if(f) openProfile(f.name); } }

        renderSubNav();
    </script>
</body>
</html>
