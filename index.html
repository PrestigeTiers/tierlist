<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="nav-item active" onclick="showPage('overall')">🏆 Overall</div>
        <div class="nav-item" onclick="showPage('vanilla')">💠 Vanilla</div>
        <div class="nav-item" onclick="showPage('uhc')">❤️ UHC</div>
        <div class="nav-item" onclick="showPage('pot')">🧪 Pot</div>
        <div class="nav-item" onclick="showPage('nethop')">🌌 NethOP</div>
        <div class="nav-item" onclick="showPage('smp')">🟢 SMP</div>
        <div class="nav-item" onclick="showPage('sword')">⚔️ Sword</div>
        <div class="nav-item" onclick="showPage('axe')">🪓 Axe</div>
        <div class="nav-item" onclick="showPage('mace')">🔨 Mace</div>
    </div>

    <div id="overall" class="page active">
        <div class="main-content">
            <div class="leaderboard-table">
                <div class="table-header"><span>#</span><span>PLAYER</span><span>REGION</span><span>TIERS</span></div>
                
                <div class="player-entry" onclick="openProfile('K1RBE', '60', '98', 'NA', 'Combat Specialist')">
                    <span class="rank-num">1.</span>
                    <div class="player-info">
                        <img src="https://mc-heads.net/avatar/K1RBE/40">
                        <div class="name-box"><span class="ign">K1RBE</span><span class="title">Combat Specialist</span></div>
                    </div>
                    <span class="region na">NA</span>
                    <div class="tier-badges"><span class="badge ht1">HT1</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="vanilla" class="page">
        <div class="tier-container">
            <div class="tier-column">
                <div class="tier-header t1">Tier 1</div>
                <div class="player-list">
                    <div class="player-row" onclick="openProfile('K1RBE', '60', '98', 'NA', 'Combat Specialist')">
                        <img src="https://mc-heads.net/avatar/K1RBE/24"><span>K1RBE</span>
                    </div>
                </div>
            </div>
            <div class="tier-column"><div class="tier-header t2">Tier 2</div><div class="player-list"></div></div>
            <div class="tier-column"><div class="tier-header t3">Tier 3</div><div class="player-list"></div></div>
            <div class="tier-column"><div class="tier-header t4">Tier 4</div><div class="player-list"></div></div>
            <div class="tier-column"><div class="tier-header t5">Tier 5</div><div class="player-list"></div></div>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalHead" src="" class="modal-avatar">
            <h2 id="modalName">Name</h2>
            <div id="modalTitle" class="modal-tag">Title</div>
            <p id="modalRegion" style="color: #a3a6aa;">Region</p>
            
            <div class="modal-stats">
                <div class="stat-box">
                    <span class="stat-label">POSITION</span>
                    <div class="stat-value"><span id="modalRank">0</span>. 🏆 OVERALL <small>(<span id="modalPoints">0</span> points)</small></div>
                </div>
            </div>

            <div class="modal-tiers">
                <h3>TIERS</h3>
                <div class="tier-grid">
                    <div class="mini-badge ht1">💠 HT1</div>
                    <div class="mini-badge lt3">⚔️ LT3</div>
                    <div class="mini-badge lt3">🧪 LT3</div>
                    <div class="mini-badge lt3">🔨 LT3</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openProfile(name, rank, points, region, title) {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalRank').innerText = rank;
            document.getElementById('modalPoints').innerText = points;
            document.getElementById('modalRegion').innerText = region;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalHead').src = `https://mc-heads.net/avatar/${name}/100`;
            document.getElementById('profileModal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('profileModal').style.display = "none";
        }
    </script>
</body>
</html>
