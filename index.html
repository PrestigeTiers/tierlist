<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="tier-column">
            <div class="tier-header t1">Tier 1</div>
            
            <div class="sub-label ht">High Tier 1</div>
            <div class="player-list">
                <div class="player-row"><img src="https://mc-heads.net/avatar/K1RBE/32"><span>K1RBE</span></div>
            </div>

            <div class="sub-label lt">Low Tier 1</div>
            <div class="player-list">
                <div class="player-row"><img src="https://mc-heads.net/avatar/xMexus/32"><span>xMexus</span></div>
            </div>
        </div>

        <div class="tier-column">
            <div class="tier-header t2">Tier 2</div>
            
            <div class="sub-label ht">High Tier 2</div>
            <div class="player-list">
                </div>

            <div class="sub-label lt">Low Tier 2</div>
            <div class="player-list">
                <div class="player-row"><img src="https://mc-heads.net/avatar/cloudmlol/32"><span>cloudmlol</span></div>
            </div>
        </div>

        <div class="tier-column">
            <div class="tier-header t3">Tier 3</div>
            <div class="sub-label ht">High Tier 3</div>
            <div class="player-list"></div>
            <div class="sub-label lt">Low Tier 3</div>
            <div class="player-list"></div>
        </div>

        <div class="tier-column">
            <div class="tier-header t4">Tier 4</div>
            <div class="sub-label ht">High Tier 4</div>
            <div class="player-list"></div>
            <div class="sub-label lt">Low Tier 4</div>
            <div class="player-list"></div>
        </div>

        <div class="tier-column">
            <div class="tier-header t5">Tier 5</div>
            <div class="sub-label ht">High Tier 5</div>
            <div class="player-list"></div>
            <div class="sub-label lt">Low Tier 5</div>
            <div class="player-list"></div>
        </div>
    </div>

</body>
</html>
