<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar-container">
        <div class="navbar">
            <div class="nav-item active" onclick="showPage('overall')">🏆<br>Overall</div>
            <div class="nav-item" onclick="showPage('vanilla')">💠<br>Vanilla</div>
            <div class="nav-item" onclick="showPage('uhc')">❤️<br>UHC</div>
            <div class="nav-item" onclick="showPage('pot')">🧪<br>Pot</div>
            <div class="nav-item" onclick="showPage('nethop')">🌌<br>NethOP</div>
            <div class="nav-item" onclick="showPage('smp')">🟢<br>SMP</div>
            <div class="nav-item" onclick="showPage('sword')">⚔️<br>Sword</div>
            <div class="nav-item" onclick="showPage('axe')">🪓<br>Axe</div>
            <div class="nav-item" onclick="showPage('mace')">🔨<br>Mace</div>
        </div>
    </div>

    <div id="overall" class="page active">
        <div class="main-content">
            <div class="leaderboard-table">
                <div class="player-card" onclick="openProfile('Marlowww', '1', '450', 'NA', 'Combat Grandmaster')">
                    <div class="rank-side">1.</div>
                    <div class="player-main">
                        <img src="https://mc-heads.net/avatar/Marlowww/50" class="head">
                        <div class="name-info">
                            <span class="ign">Marlowww</span>
                            <span class="sub-title">🔶 Combat Grandmaster <span class="pts">(450 points)</span></span>
                        </div>
                    </div>
                    <div class="region-box na">NA</div>
                    <div class="tiers-row">
                        <div class="t-icon">⚔️<div class="t-label ht1">HT1</div></div>
                        <div class="t-icon">🧪<div class="t-label ht1">HT1</div></div>
                        <div class="t-icon">🔨<div class="t-label lt1">LT1</div></div>
                        <div class="t-icon">❤️<div class="t-label ht1">HT1</div></div>
                    </div>
                </div>
                </div>
        </div>
    </div>

    <div id="vanilla" class="page"><div class="tier-container" id="vanilla-tiers"></div></div>
    <div id="uhc" class="page"><div class="tier-container" id="uhc-tiers"></div></div>
    <div id="pot" class="page"><div class="tier-container" id="pot-tiers"></div></div>
    <div id="nethop" class="page"><div class="tier-container" id="nethop-tiers"></div></div>
    <div id="smp" class="page"><div class="tier-container" id="smp-tiers"></div></div>
    <div id="sword" class="page"><div class="tier-container" id="sword-tiers"></div></div>
    <div id="axe" class="page"><div class="tier-container" id="axe-tiers"></div></div>
    <div id="mace" class="page"><div class="tier-container" id="mace-tiers"></div></div>

    <div id="profileModal" class="modal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalHead" src="" class="modal-avatar">
            <h2 id="modalName">Name</h2>
            <div id="modalTitle" class="modal-tag">Title</div>
            <div class="modal-stats">
                <span class="label">POSITION</span>
                <div class="val"><span id="modalRank">0</span>. 🏆 OVERALL (<span id="modalPoints">0</span> pts)</div>
            </div>
        </div>
    </div>

    <script>
        // Setup tiers for all pages
        const modes = ['vanilla', 'uhc', 'pot', 'nethop', 'smp', 'sword', 'axe', 'mace'];
        modes.forEach(mode => {
            const container = document.getElementById(`${mode}-tiers`);
            for(let i=1; i<=5; i++) {
                container.innerHTML += `<div class="tier-col"><div class="tier-head t${i}">Tier ${i}</div><div class="p-list" id="${mode}-t${i}"></div></div>`;
            }
        });

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openProfile(name, rank, points, region, title) {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalRank').innerText = rank;
            document.getElementById('modalPoints').innerText = points;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalHead').src = `https://mc-heads.net/avatar/${name}/100`;
            document.getElementById('profileModal').style.display = "flex";
        }
        function closeModal() { document.getElementById('profileModal').style.display = "none"; }
        function closeModalOutside(e) { if(e.target.id === "profileModal") closeModal(); }
    </script>
</body>
</html>
