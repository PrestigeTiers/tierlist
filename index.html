<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist | Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="nav-item active" onclick="showPage('overall')">🏆 Overall</div>
        <div class="nav-item" onclick="showPage('vanilla')">⚔️ Vanilla</div>
        <div class="nav-item" onclick="showPage('pot')">🧪 Pot</div>
        </div>

    <div id="overall" class="page active">
        <div class="main-content">
            <h2>Overall Leaderboard</h2>
            <div class="leaderboard-table">
                <div class="table-header"><span>#</span><span>PLAYER</span><span>REGION</span><span>TIERS</span></div>
                
                <div class="player-entry">
                    <span class="rank-num">1.</span>
                    <div class="player-info">
                        <img src="https://mc-heads.net/avatar/Marlowww/40">
                        <div class="name-box"><span class="ign">Marlowww</span><span class="title gold">Combat Grandmaster</span></div>
                    </div>
                    <span class="region na">NA</span>
                    <div class="tier-badges"><span class="badge ht1">HT1</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="vanilla" class="page">
        <div class="tier-container">
            <div class="tier-column">
                <div class="tier-header t1">Tier 1</div>
                <div class="sub-label ht">High Tier 1</div>
                <div class="player-list">
                    <div class="player-row"><img src="https://mc-heads.net/avatar/K1RBE/24"><span>K1RBE</span></div>
                </div>
            </div>
            </div>
    </div>

    <div id="pot" class="page">
        <div class="tier-container">
            <h2 style="text-align:center; width:100%;">Pot Rankings</h2>
            </div>
    </div>

    <script>
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Remove active class from all nav items
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Show the clicked page
            document.getElementById(pageId).classList.add('active');
            // Make the clicked nav item glow
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
