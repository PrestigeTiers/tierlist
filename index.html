<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tierlist Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="nav-item active" onclick="showPage('overall')">🏆 Overall</div>
        <div class="nav-item" onclick="showPage('vanilla')">💠 Vanilla</div>
        <div class="nav-item" onclick="showPage('uhc')">❤️ UHC</div>
        <div class="nav-item" onclick="showPage('pot')">🧪 Pot</div>
        <div class="nav-item" onclick="showPage('nethop')">🌌 NethOP</div>
        <div class="nav-item" onclick="showPage('smp')">🟢 SMP</div>
        <div class="nav-item" onclick="showPage('sword')">⚔️ Sword</div>
        <div class="nav-item" onclick="showPage('axe')">🪓 Axe</div>
        <div class="nav-item" onclick="showPage('mace')">🔨 Mace</div>
    </div>

    <div id="overall" class="page active">
        <div class="main-content">
            <div class="leaderboard-table">
                <div class="table-header"><span>#</span><span>PLAYER</span><span>REGION</span><span>TIERS</span></div>
                
                <div class="player-entry" onclick="openProfile('K1RBE', '1', '450', 'NA', 'Combat Grandmaster')">
                    <span class="rank-num">1.</span>
                    <div class="player-info">
                        <img src="https://mc-heads.net/avatar/K1RBE/40">
                        <div class="name-box"><span class="ign">K1RBE</span><span class="title gold">Combat Grandmaster</span></div>
                    </div>
                    <span class="region na">NA</span>
                    <div class="tier-badges"><span class="badge ht1">HT1</span><span class="badge ht1">HT1</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="vanilla" class="page"><div class="tier-container" id="vanilla-tiers"></div></div>
    <div id="uhc" class="page"><div class="tier-container" id="uhc-tiers"></div></div>
    <div id="pot" class="page"><div class="tier-container" id="pot-tiers"></div></div>
    <div id="nethop" class="page"><div class="tier-container" id="nethop-tiers"></div></div>
    <div id="smp" class="page"><div class="tier-container" id="smp-tiers"></div></div>
    <div id="sword" class="page"><div class="tier-container" id="sword-tiers"></div></div>
    <div id="axe" class="page"><div class="tier-container" id="axe-tiers"></div></div>
    <div id="mace" class="page"><div class="tier-container" id="mace-tiers"></div></div>

    <div id="profileModal" class="modal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalHead" src="" class="modal-avatar">
            <h2 id="modalName">Name</h2>
            <div id="modalTitle" class="modal-tag">Title</div>
            <p id="modalRegion">Region</p>
            
            <div class="modal-stats">
                <div class="stat-box">
                    <span class="stat-label">POSITION</span>
                    <div class="stat-value"><span id="modalRank">0</span>. 🏆 OVERALL <small>(<span id="modalPoints">0</span> pts)</small></div>
                </div>
            </div>

            <div class="modal-tiers">
                <h3>TIERS</h3>
                <div class="tier-grid">
                    <div class="mini-badge ht1">💠 HT1</div>
                    <div class="mini-badge lt3">⚔️ LT3</div>
                    <div class="mini-badge lt3">🧪 LT3</div>
                    <div class="mini-badge lt3">🔨 LT3</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modes = ['vanilla', 'uhc', 'pot', 'nethop', 'smp', 'sword', 'axe', 'mace'];
        
        // Auto-generate Tiers 1 to 5 for every gamemode
        modes.forEach(mode => {
            const container = document.getElementById(`${mode}-tiers`);
            for(let i=1; i<=5; i++) {
                container.innerHTML += `
                    <div class="tier-column">
                        <div class="tier-header t${i}">Tier ${i}</div>
                        <div class="player-list" id="${mode}-t${i}"></div>
                    </div>`;
            }
        });

        // Test Data: Adding K1RBE to Vanilla Tier 1
        document.getElementById('vanilla-t1').innerHTML = `
            <div class="player-row" onclick="openProfile('K1RBE', '1', '450', 'NA', 'Combat Grandmaster')">
                <img src="https://mc-heads.net/avatar/K1RBE/24"><span>K1RBE</span>
            </div>`;

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openProfile(name, rank, points, region, title) {
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalRank').innerText = rank;
            document.getElementById('modalPoints').innerText = points;
            document.getElementById('modalRegion').innerText = region;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalHead').src = `https://mc-heads.net/avatar/${name}/100`;
            document.getElementById('profileModal').style.display = "flex";
        }

        function closeModal() { document.getElementById('profileModal').style.display = "none"; }
        function closeModalOutside(e) { if(e.target.id === "profileModal") closeModal(); }
    </script>
</body>
</html>
