<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Tiers | Minecraft Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0f; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .pill-btn { padding: 10px 24px; border-radius: 12px; transition: 0.2s; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #71717a; font-weight: 600; }
        .pill-btn.active { background: #1a1a1e; border-color: #3f3f46; color: #ffffff; }
        .sub-pill { display: flex; items-center: center; gap: 8px; padding: 8px 16px; border-radius: 8px; background: transparent; transition: 0.2s; border: 1px solid transparent; color: #a1a1aa; font-weight: 500; font-size: 0.95rem; }
        .sub-pill.active { background: #27272a; border-color: #3f3f46; color: #ffffff; }
        .sub-pill img { width: 18px; height: 18px; object-fit: contain; }
        .tier-badge { background: #16161a; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; color: #a1a1aa; border: 1px solid #27272a; text-transform: uppercase; }
        .rating-num { color: #a78bfa; font-weight: 800; font-size: 1.6rem; }
        .info-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .info-modal.active { display: flex; }
        .point-card { background: #111115; border: 1px solid #1f1f23; border-radius: 14px; padding: 24px; width: 190px; text-align: center; }
        .purple-bar { height: 5px; background: #8b5cf6; border-radius: 10px; margin: 12px auto; box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="p-8">

    <header class="flex items-center justify-between mb-10 max-w-7xl mx-auto">
        <div class="flex items-center gap-10">
            <h1 class="text-3xl font-black tracking-tight">Knight Tiers</h1>
            <button onclick="toggleInfo(true)" class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 hover:text-white transition cursor-pointer">Information</button>
        </div>
        
        <div class="flex gap-3">
            <button onclick="switchMain('global')" id="btn-global" class="pill-btn active">Global</button>
            <button onclick="switchMain('main')" id="btn-main" class="pill-btn">Main Modes</button>
            <button onclick="switchMain('sub')" id="btn-sub" class="pill-btn">Sub Modes</button>
        </div>
        <div class="w-12"></div>
    </header>

    <div class="max-w-7xl mx-auto">
        <div id="sub-nav-container" class="glass-card p-2 flex gap-2 mb-8 overflow-x-auto no-scrollbar">
            </div>
    </div>

    <main class="max-w-7xl mx-auto" id="content-display">
        </main>

    <div id="infoModal" class="info-modal" onclick="toggleInfo(false)">
        <div class="max-w-6xl w-full p-10 glass-card bg-[#0d0d0f]" onclick="event.stopPropagation()">
            <h2 class="text-4xl font-bold mb-3">How the Point System Works</h2>
            <p class="text-zinc-400 mb-10 text-lg max-w-3xl">Knight Tiers tracks player rankings across various game modes. Each tier assignment earns points based on the difficulty and prestige of achieving that rank.</p>
            
            <div id="point-cards-grid" class="flex flex-wrap gap-5 justify-start">
                </div>
        </div>
    </div>

    <script>
        const ICONS = {
            'Overall': 'https://minecraft.wiki/images/Cup_JE1_BE1.png',
            'Sword': 'https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png',
            'Axe': 'https://minecraft.wiki/images/Diamond_Axe_JE3_BE3.png',
            'Vanilla': 'https://minecraft.wiki/images/End_Crystal_JE2_BE2.png',
            'Pot': 'https://minecraft.wiki/images/Splash_Potion_of_Healing_JE2_BE2.png',
            'NethOP': 'https://minecraft.wiki/images/Netherite_Helmet_JE2_BE2.png',
            'UHC': 'https://minecraft.wiki/images/Lava_Bucket_JE2_BE2.png',
            'SMP': 'https://minecraft.wiki/images/Ender_Pearl_JE3_BE2.png',
            'Mace': 'https://minecraft.wiki/images/Mace_JE1_BE1.png',
            'MineCart': 'https://minecraft.wiki/images/TNT_Minecart_JE2_BE2.png',
            'DSMP': 'https://minecraft.wiki/images/Dragon_Egg_JE3_BE2.png',
            'Spear Mace': 'https://minecraft.wiki/images/Trident_JE2_BE1.png',
            'EU': 'https://minecraft.wiki/images/Globe_Banner_Pattern_JE1_BE1.png',
            'NA': 'https://minecraft.wiki/images/Globe_Banner_Pattern_JE1_BE1.png',
            'AS': 'https://minecraft.wiki/images/Globe_Banner_Pattern_JE1_BE1.png'
        };

        const TIERS_CONFIG = {
            'HT1': {pts: 60, w: '100%'}, 'LT1': {pts: 45, w: '85%'},
            'HT2': {pts: 30, w: '70%'}, 'LT2': {pts: 20, w: '55%'},
            'HT3': {pts: 10, w: '40%'}, 'LT3': {pts: 6, w: '30%'},
            'HT4': {pts: 4, w: '20%'},  'LT4': {pts: 3, w: '15%'},
            'HT5': {pts: 2, w: '10%'},  'LT5': {pts: 1, w: '5%'}
        };

        const NAV_MAP = {
            global: ['Overall', 'EU', 'NA', 'AS'],
            main: ['Overall', 'Sword', 'Axe', 'Vanilla', 'Pot', 'NethOP', 'UHC', 'SMP', 'Mace'],
            sub: ['Overall', 'MineCart', 'DSMP', 'Spear Mace']
        };

        let activeMain = 'global';
        let activeSub = 'Overall';

        function toggleInfo(val) { document.getElementById('infoModal').classList.toggle('active', val); }

        function renderPoints() {
            document.getElementById('point-cards-grid').innerHTML = Object.entries(TIERS_CONFIG).map(([t, d]) => `
                <div class="point-card">
                    <div class="text-zinc-500 font-bold text-xs mb-1">${t}</div>
                    <div class="text-3xl font-black mb-2">${d.pts} pts</div>
                    <div class="purple-bar" style="width: ${d.w}"></div>
                    <div class="text-[9px] uppercase font-black text-zinc-600 tracking-widest">Leaderboard Rank</div>
                </div>
            `).join('');
        }

        function switchMain(key) {
            activeMain = key;
            activeSub = 'Overall';
            ['global', 'main', 'sub'].forEach(k => document.getElementById(`btn-${k}`).classList.toggle('active', k === key));
            renderSubNav();
            renderContent();
        }

        function renderSubNav() {
            document.getElementById('sub-nav-container').innerHTML = NAV_MAP[activeMain].map(mode => `
                <button onclick="switchSub('${mode}')" class="sub-pill ${activeSub === mode ? 'active' : ''}">
                    <img src="${ICONS[mode] || ICONS['Overall']}" alt="">
                    ${mode}
                </button>
            `).join('');
        }

        function switchSub(mode) {
            activeSub = mode;
            renderSubNav();
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('content-display');
            if (activeSub === 'Overall' || activeMain === 'global') {
                container.innerHTML = `
                    <div class="flex px-8 py-3 text-[10px] font-bold text-zinc-600 uppercase tracking-[0.2em] mb-4">
                        <div class="w-20">Rank</div>
                        <div class="flex-1">Player</div>
                        <div class="w-32">Region</div>
                        <div class="w-72">Tiers</div>
                        <div class="w-32 text-right">Rating</div>
                    </div>
                    ${Array.from({length: 6}).map((_, i) => `
                        <div class="glass-card p-5 mb-4 flex items-center hover:bg-white/[0.04] transition group">
                            <div class="w-20 font-black text-2xl text-zinc-700 group-hover:text-zinc-400 transition">${i+1}</div>
                            <div class="flex-1 flex items-center gap-5">
                                <img src="https://visage.surgeplay.com/head/64/abbade22" class="w-12 h-12 rounded-lg">
                                <div>
                                    <div class="font-bold text-lg">KnightPlayer_${i}</div>
                                    <div class="text-xs text-zinc-500 font-medium italic">Combat Ace</div>
                                </div>
                            </div>
                            <div class="w-32"><span class="bg-red-900/20 text-red-400 text-[11px] px-3 py-1 rounded-md font-bold border border-red-900/30">EU</span></div>
                            <div class="w-72 flex gap-1.5">
                                <div class="flex flex-col items-center gap-1">
                                    <img src="${ICONS['Sword']}" class="w-5 h-5">
                                    <div class="tier-badge">HT1</div>
                                </div>
                                <div class="flex flex-col items-center gap-1">
                                    <img src="${ICONS['Axe']}" class="w-5 h-5">
                                    <div class="tier-badge">LT2</div>
                                </div>
                                <div class="self-center bg-purple-900/20 text-purple-400 text-[10px] font-bold w-8 h-8 flex items-center justify-center rounded-full border border-purple-500/20 ml-2">+12</div>
                            </div>
                            <div class="w-32 text-right rating-num">${200 - (i*15)}</div>
                        </div>
                    `).join('')}
                `;
            } else {
                container.innerHTML = `
                    <div class="grid grid-cols-5 gap-5">
                        ${[1,2,3,4,5].map(t => `
                            <div class="flex flex-col gap-4">
                                <div class="glass-card p-4 text-center font-black text-zinc-400 uppercase tracking-widest border-t-4 ${t===1 ? 'border-yellow-500' : 'border-zinc-800'}">Tier ${t}</div>
                                <div class="glass-card p-4 flex items-center gap-4 hover:bg-white/5 transition">
                                    <img src="https://visage.surgeplay.com/head/64/12345" class="w-8 h-8 rounded">
                                    <span class="font-bold text-sm">PlayerOne</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        // INIT
        renderPoints();
        switchMain('global');
    </script>
</body>
</html>
