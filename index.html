<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Tiers | Minecraft Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0f; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .pill-btn { padding: 10px 24px; border-radius: 12px; transition: 0.2s; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #71717a; font-weight: 600; }
        .pill-btn.active { background: #1a1a1e; border-color: #3f3f46; color: #ffffff; }
        
        .sub-pill { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; background: transparent; transition: 0.2s; border: 1px solid transparent; color: #a1a1aa; font-weight: 500; font-size: 0.95rem; }
        .sub-pill.active { background: #27272a; border-color: #3f3f46; color: #ffffff; }
        .sub-pill img { width: 22px; height: 22px; image-rendering: pixelated; }

        .tier-column { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; height: 75vh; display: flex; flex-direction: column; }
        .tier-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .player-square { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; transition: 0.2s; cursor: pointer; }
        .player-square:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }

        .tier-badge { background: #16161a; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: #a1a1aa; border: 1px solid #27272a; }
        .rating-num { color: #a78bfa; font-weight: 800; font-size: 1.6rem; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; backdrop-filter: blur(12px); align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        
        .profile-card { background: #0d0d11; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; width: 450px; padding: 32px; position: relative; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #facc15; margin: 0 auto 16px; display: block; }
        
        .search-input { width: 250px; background: #16161a; border: 1px solid #27272a; border-radius: 10px; padding: 8px 12px; font-size: 0.9rem; outline: none; }

        .mode-icon-circle { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 4px; }
        .mode-icon-circle img { width: 24px; height: 24px; image-rendering: pixelated; }
    </style>
</head>
<body class="p-8">

    <header class="flex items-center justify-between mb-8 max-w-7xl mx-auto">
        <h1 class="text-3xl font-black tracking-tight">Knight Tiers</h1>
        <div class="flex gap-3">
            <button onclick="switchMain('global')" id="btn-global" class="pill-btn active">Global</button>
            <button onclick="switchMain('main')" id="btn-main" class="pill-btn">Main Modes</button>
            <button onclick="switchMain('sub')" id="btn-sub" class="pill-btn">Sub Modes</button>
        </div>
        <input type="text" id="searchBar" class="search-input" placeholder="Search players..." onkeyup="handleSearch(event)">
    </header>

    <div class="max-w-7xl mx-auto">
        <div id="sub-nav-container" class="glass-card p-2 flex gap-2 mb-8 overflow-x-auto no-scrollbar"></div>
    </div>

    <main class="max-w-7xl mx-auto h-[75vh] overflow-y-auto pr-2 no-scrollbar" id="content-display"></main>

    <div id="profileModal" class="modal-overlay" onclick="closeProfile()">
        <div class="profile-card" onclick="event.stopPropagation()">
            <button onclick="closeProfile()" class="absolute top-4 right-4 text-zinc-500 hover:text-white text-2xl">&times;</button>
            <img id="p-avatar" src="" class="profile-avatar shadow-[0_0_20px_rgba(250,204,21,0.3)]">
            <h2 id="p-name" class="text-center text-3xl font-black mb-1 bg-gradient-to-r from-pink-400 to-blue-400 bg-clip-text text-transparent"></h2>
            <div class="flex justify-center gap-2 mb-8">
                <span id="p-region" class="bg-green-500/10 text-green-500 text-[10px] font-black px-3 py-1 rounded-md border border-green-500/20 uppercase"></span>
            </div>
            <div class="mb-6">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Overall Standing</p>
                <div class="glass-card p-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img id="modal-trophy" src="" class="w-8 h-8">
                        <span class="font-bold">Rating Points</span>
                    </div>
                    <span id="p-total" class="text-zinc-500 text-sm font-bold"></span>
                </div>
            </div>
            <div>
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Active Tiers</p>
                <div id="p-tiers-grid" class="glass-card p-4 grid grid-cols-5 gap-3 max-h-48 overflow-y-auto no-scrollbar pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        // Use jsDelivr and public GitHub assets to bypass GitHub Pages hotlink protection
        const ASSETS = {
            'Overall': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/gui/sprites/hud/heart/container.png', 
            'Trophy': 'https://raw.githubusercontent.com/piston-data/resourcepack/master/assets/minecraft/textures/item/gold_ingot.png', // Temporary until trophy is cached
            'Trophy_Final': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/trial_key.png',
            'Sword': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/diamond_sword.png',
            'Axe': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/diamond_axe.png',
            'Vanilla': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/end_crystal.png',
            'Pot': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/potion.png',
            'NethOP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/netherite_helmet.png',
            'UHC': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/lava_bucket.png',
            'SMP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/ender_pearl.png',
            'Mace': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/mace.png',
            'Minecart': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/tnt_minecart.png',
            'DSMP': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/chorus_fruit.png',
            'Spear Mace': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/breeze_rod.png',
            'Region': 'https://cdn.jsdelivr.net/gh/misode/mcmeta@assets/assets/minecraft/textures/item/elytra.png'
        };

        const TIERS_CONFIG = { 'HT1': 60, 'LT1': 45, 'HT2': 30, 'LT2': 20, 'HT3': 10, 'LT3': 6, 'HT4': 4, 'LT4': 3, 'HT5': 2, 'LT5': 1 };

        const PLAYERS = [
            { name: "ossspooky", region: "EU", skin: "https://mc-heads.net/avatar/ossspooky/64", ranks: { 'Sword': 'HT1', 'Axe': 'LT1', 'Vanilla': 'HT2', 'Pot': 'LT2', 'NethOP': 'HT3', 'UHC': 'LT3', 'SMP': 'HT4', 'Mace': 'LT4', 'Minecart': 'HT5', 'DSMP': 'LT5', 'Spear Mace': 'HT2' }},
            { name: "KamQd", region: "NA", skin: "https://mc-heads.net/avatar/KamQd/64", ranks: { 'Sword': 'LT1', 'Mace': 'LT2', 'SMP': 'HT3', 'Pot': 'LT3', 'UHC': 'LT3', 'Spear Mace': 'LT4' }}
        ];

        const NAV_MAP = {
            global: ['Overall', 'EU', 'NA', 'AS'],
            main: ['Overall', 'Sword', 'Axe', 'Vanilla', 'Pot', 'NethOP', 'UHC', 'SMP', 'Mace'],
            sub: ['Overall', 'Minecart', 'DSMP', 'Spear Mace']
        };

        let activeMain = 'global', activeSub = 'Overall';

        function calculateRating(player) {
            return Object.values(player.ranks).reduce((acc, tier) => acc + (TIERS_CONFIG[tier] || 0), 0);
        }

        function openProfile(pName) {
            const p = PLAYERS.find(x => x.name.toLowerCase() === pName.toLowerCase());
            if(!p) return;
            document.getElementById('p-avatar').src = p.skin;
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-region').innerText = p.region;
            document.getElementById('modal-trophy').src = ASSETS['Trophy_Final'];
            document.getElementById('p-total').innerText = calculateRating(p) + " points";
            document.getElementById('p-tiers-grid').innerHTML = Object.entries(p.ranks).map(([mode, tier]) => `
                <div class="mode-icon-circle">
                    <img src="${ASSETS[mode]}" alt="">
                    <span class="text-[8px] font-black mt-1 text-zinc-500">${tier}</span>
                </div>
            `).join('');
            document.getElementById('profileModal').classList.add('active');
        }

        function closeProfile() { document.getElementById('profileModal').classList.remove('active'); }

        function handleSearch(e) {
            if(e.key === 'Enter') {
                const found = PLAYERS.find(p => p.name.toLowerCase().includes(e.target.value.toLowerCase()));
                if(found) openProfile(found.name);
            }
        }

        function switchMain(key) {
            activeMain = key; activeSub = 'Overall';
            ['global', 'main', 'sub'].forEach(k => document.getElementById(`btn-${k}`).classList.toggle('active', k === key));
            renderSubNav(); renderContent();
        }

        function renderSubNav() {
            document.getElementById('sub-nav-container').innerHTML = NAV_MAP[activeMain].map(mode => `
                <button onclick="switchSub('${mode}')" class="sub-pill ${activeSub === mode ? 'active' : ''}">
                    <img src="${['EU', 'NA', 'AS'].includes(mode) ? ASSETS['Region'] : (mode === 'Overall' ? ASSETS['Trophy_Final'] : ASSETS[mode])}" alt="">
                    ${mode === 'Overall' ? 'Points' : mode}
                </button>
            `).join('');
        }

        function switchSub(mode) { activeSub = mode; renderSubNav(); renderContent(); }

        function renderContent() {
            const container = document.getElementById('content-display');
            const sorted = [...PLAYERS].sort((a,b) => calculateRating(b) - calculateRating(a));

            if (activeSub === 'Overall' || activeMain === 'global') {
                container.innerHTML = `
                    <div class="flex px-8 py-3 text-[10px] font-bold text-zinc-600 uppercase mb-4">
                        <div class="w-20">Rank</div><div class="flex-1">Player</div><div class="w-32">Region</div><div class="w-72">Mode Ranks</div><div class="w-32 text-right">Rating</div>
                    </div>
                    ${sorted.map((p, i) => `
                        <div class="glass-card p-5 mb-4 flex items-center hover:bg-white/[0.04] transition group" onclick="openProfile('${p.name}')">
                            <div class="w-20 font-black text-2xl ${i < 3 ? 'text-yellow-500' : 'text-zinc-600'}">${i+1}</div>
                            <div class="flex-1 flex items-center gap-5">
                                <img src="${p.skin}" class="w-12 h-12 rounded-lg">
                                <span class="font-bold text-lg">${p.name}</span>
                            </div>
                            <div class="w-32"><span class="bg-zinc-800 text-zinc-300 text-[11px] px-3 py-1 rounded-md font-bold">${p.region}</span></div>
                            <div class="w-72 flex gap-2">
                                ${Object.entries(p.ranks).slice(0, 4).map(([mode, tier]) => `
                                    <div class="flex flex-col items-center">
                                        <img src="${ASSETS[mode]}" class="w-5 h-5 mb-1">
                                        <div class="tier-badge">${tier}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="w-32 text-right rating-num">${calculateRating(p)}</div>
                        </div>
                    `).join('')}
                `;
            } else {
                container.innerHTML = `<div class="grid grid-cols-5 gap-6">
                    ${[1,2,3,4,5].map(t => `
                        <div class="tier-column">
                            <div class="tier-header ${t === 1 ? 'text-yellow-500' : 'text-zinc-500'}">Tier ${t}</div>
                            <div class="p-4 flex flex-col gap-3">
                                ${PLAYERS.filter(p => p.ranks[activeSub] === `HT${t}` || p.ranks[activeSub] === `LT${t}`).map(p => `
                                    <div class="player-square" onclick="openProfile('${p.name}')">
                                        <img src="${p.skin}" class="w-8 h-8 rounded shadow-lg">
                                        <div class="flex flex-col">
                                            <span class="font-bold text-sm">${p.name}</span>
                                            <span class="text-[9px] text-zinc-500 font-black uppercase">${p.ranks[activeSub]}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }
        }
        switchMain('global');
    </script>
</body>
</html>
